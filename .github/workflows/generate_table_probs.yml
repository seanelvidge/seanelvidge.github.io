name: Generate table probabilities

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CSV freshness
        id: freshness
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import csv
          import hashlib
          import json
          import os
          import re
          import urllib.request

          CSV_URL = "https://raw.githubusercontent.com/seanelvidge/England-football-results/refs/heads/main/EnglandLeagueResults_wRanks.csv"
          JSON_PATH = os.path.join("assets", "data", "tableProbs.json")
          CONFIG_PATH = os.path.join("assets", "data", "tableProbsSeasonConfig.json")

          def latest_csv_info():
            with urllib.request.urlopen(CSV_URL) as resp:
              text = resp.read().decode("utf-8", errors="ignore")
            reader = csv.reader(text.splitlines())
            header = next(reader, None)
            if not header:
              return "", ""
            try:
              date_idx = header.index("Date")
            except ValueError:
              date_idx = -1
            try:
              season_idx = header.index("Season")
            except ValueError:
              season_idx = -1
            last_date = ""
            last_season = ""
            for row in reader:
              if not row:
                continue
              if date_idx >= 0 and len(row) > date_idx and row[date_idx]:
                last_date = row[date_idx]
              if season_idx >= 0 and len(row) > season_idx and row[season_idx]:
                last_season = row[season_idx]
            return last_date, last_season

          def file_hash(path):
            if not os.path.exists(path):
              return ""
            h = hashlib.sha256()
            with open(path, "rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                h.update(chunk)
            return h.hexdigest()

          def season_start_year(season):
            m = re.search(r"(\d{4})", str(season or ""))
            return int(m.group(1)) if m else -1

          def config_season():
            if not os.path.exists(CONFIG_PATH):
              return ""
            with open(CONFIG_PATH, "r", encoding="utf-8") as f:
              data = json.load(f)
            return data.get("season", "") or ""

          def last_json_info():
            if not os.path.exists(JSON_PATH):
              return "", "", ""
            with open(JSON_PATH, "r", encoding="utf-8") as f:
              data = json.load(f)
            return (
              data.get("last_result_date", "") or "",
              data.get("season", "") or "",
              data.get("season_config_hash", "") or "",
            )

          csv_date, csv_season = latest_csv_info()
          json_date, json_season, json_config_hash = last_json_info()
          cfg_season = config_season()
          config_active = bool(cfg_season) and season_start_year(cfg_season) >= season_start_year(csv_season or "")
          config_hash = file_hash(CONFIG_PATH) if config_active else ""
          should_run = bool(csv_date) and csv_date != json_date
          if not json_date:
            should_run = True
          if config_hash and config_hash != json_config_hash:
            should_run = True
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
            should_run = True
          print(f"run={'true' if should_run else 'false'}")
          print(f"csv_date={csv_date}")
          print(f"csv_season={csv_season}")
          print(f"json_date={json_date}")
          print(f"json_season={json_season}")
          print(f"config_season={cfg_season}")
          print(f"config_hash={config_hash}")
          print(f"json_config_hash={json_config_hash}")
          PY

      - name: Setup Node
        if: steps.freshness.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.freshness.outputs.run == 'true'
        run: npm ci

      - name: Generate table probabilities
        if: steps.freshness.outputs.run == 'true'
        run: node scripts/generate_table_probs.js
        env:
          SIMS: "1000000"
          ILP_MAX_CASES: "200"
          ILP_MAX_SECONDS: "2400"
          ILP_CASE_SECONDS: "90"

      - name: Commit and push if changed
        if: steps.freshness.outputs.run == 'true'
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/tableProbs.json
          git commit -m "Update table probabilities"

          for attempt in 1 2 3; do
              git fetch origin master
              git rebase origin/master
              if git push origin HEAD:master; then
                exit 0
              fi
              echo "Push failed on attempt ${attempt}; retrying after refetch."
              sleep 5
          done

          echo "Failed to push after 3 attempts."
          exit 1
