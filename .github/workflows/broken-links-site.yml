name: Check for broken links on site

on:
  workflow_run:
    workflows: [Deploy site]
    types: [completed]

jobs:
  check-links-on-site:
    # Only run if the Deploy site workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # Ruby/Jekyll setup
      - name: Set up Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # Node is needed for purgecss
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Fix 1: ImageMagick is required by jekyll-imagemagick
      - name: Install ImageMagick 🖼️
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install dependencies 📦
        run: |
          bundle install --jobs 4 --retry 3

      - name: Build site 🏗️
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll build

      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js

      # Fix 2: only scan the built site output, not vendor/bundle etc.
      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          # only check local links in the generated site
          args: --offline --verbose --no-progress --root-dir "${{ github.workspace }}/_site" "_site/**/*.html"
